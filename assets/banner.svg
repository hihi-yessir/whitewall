<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#0F0A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Verification flow visualization (right side) -->
  <!-- Step circles connected by lines -->
  <g transform="translate(600, 200)">
    <!-- Connection line -->
    <line x1="0" y1="0" x2="480" y2="0" stroke="#222222" stroke-width="2"/>

    <!-- Step 1: Register -->
    <circle cx="0" cy="0" r="28" fill="#141414" stroke="#666666" stroke-width="1.5"/>
    <text x="0" y="-4" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#EEEEEE" text-anchor="middle">1</text>
    <text x="0" y="12" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#666666" text-anchor="middle">REG</text>
    <text x="0" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#666666" text-anchor="middle">Register</text>

    <!-- Step 2: Bond (World ID) -->
    <circle cx="120" cy="0" r="28" fill="#141414" stroke="#2EAD6B" stroke-width="1.5"/>
    <text x="120" y="-4" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#2EAD6B" text-anchor="middle">2</text>
    <text x="120" y="12" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#2EAD6B" text-anchor="middle">ZK</text>
    <text x="120" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#2EAD6B" text-anchor="middle">World ID</text>
    <line x1="28" y1="0" x2="92" y2="0" stroke="#2EAD6B" stroke-width="1.5" opacity="0.4"/>

    <!-- Step 3: KYC -->
    <circle cx="240" cy="0" r="28" fill="#141414" stroke="#375BD2" stroke-width="1.5"/>
    <text x="240" y="-4" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#375BD2" text-anchor="middle">3</text>
    <text x="240" y="12" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#375BD2" text-anchor="middle">KYC</text>
    <text x="240" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#375BD2" text-anchor="middle">Stripe</text>
    <line x1="148" y1="0" x2="212" y2="0" stroke="#375BD2" stroke-width="1.5" opacity="0.4"/>

    <!-- Step 4: Credit -->
    <circle cx="360" cy="0" r="28" fill="#141414" stroke="#FF9F1C" stroke-width="1.5"/>
    <text x="360" y="-4" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#FF9F1C" text-anchor="middle">4</text>
    <text x="360" y="12" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#FF9F1C" text-anchor="middle">TEE</text>
    <text x="360" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#FF9F1C" text-anchor="middle">Plaid</text>
    <line x1="268" y1="0" x2="332" y2="0" stroke="#FF9F1C" stroke-width="1.5" opacity="0.4"/>

    <!-- Step 5: Access -->
    <circle cx="480" cy="0" r="28" fill="#375BD2" fill-opacity="0.2" stroke="#375BD2" stroke-width="2"/>
    <text x="480" y="6" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#EEEEEE" text-anchor="middle">GO</text>
    <text x="480" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#375BD2" text-anchor="middle">Access</text>
    <line x1="388" y1="0" x2="452" y2="0" stroke="#375BD2" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Tier labels above -->
  <g opacity="0.3">
    <text x="720" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#2EAD6B" text-anchor="middle" letter-spacing="1">TIER 2</text>
    <text x="840" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#375BD2" text-anchor="middle" letter-spacing="1">TIER 3</text>
    <text x="960" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#FF9F1C" text-anchor="middle" letter-spacing="1">TIER 4</text>
  </g>

  <!-- Logo + Title (left side) -->
  <rect x="80" y="148" width="5" height="28" rx="1" fill="#EEEEEE" opacity="0.3"/>
  <rect x="90" y="148" width="5" height="28" rx="1" fill="#EEEEEE" opacity="0.6"/>
  <rect x="100" y="148" width="5" height="28" rx="1" fill="#EEEEEE" opacity="0.9"/>
  <text x="118" y="172" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="900" letter-spacing="2" fill="#EEEEEE">WHITEWALL</text>

  <text x="82" y="215" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400" fill="#EEEEEE" opacity="0.5">The wall that lets you through</text>

  <text x="82" y="260" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#666666">Demo app for the Whitewall OS</text>
  <text x="82" y="278" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#666666">verification flow</text>
</svg>
