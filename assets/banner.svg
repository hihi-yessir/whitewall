<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#0F0A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="fadeL" x1="0%" y1="0%" x2="20%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="85%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="fadeT" x1="0%" y1="0%" x2="0%" y2="8%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeB" x1="0%" y1="92%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Mesh background -->
  <g opacity="0.05" stroke="#EEEEEE" stroke-width="0.7" fill="none">
    <line x1="500" y1="0" x2="1300" y2="180"/><line x1="500" y1="100" x2="1300" y2="190"/>
    <line x1="500" y1="200" x2="1300" y2="200"/><line x1="500" y1="300" x2="1300" y2="210"/>
    <line x1="500" y1="400" x2="1300" y2="220"/>
    <line x1="600" y1="0" x2="603" y2="400"/><line x1="730" y1="0" x2="727" y2="400"/>
    <line x1="860" y1="0" x2="850" y2="400"/><line x1="990" y1="0" x2="974" y2="400"/>
    <line x1="1120" y1="0" x2="1097" y2="400"/>
  </g>

  <!-- Verification flow: 5 steps -->
  <g transform="translate(580, 200)">
    <!-- Connection line -->
    <line x1="0" y1="0" x2="500" y2="0" stroke="#222222" stroke-width="1.5"/>

    <!-- Step 1: Register -->
    <circle cx="0" cy="0" r="10" fill="#666666" opacity="0.08"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#666666" stroke-width="1" opacity="0.3"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#EEEEEE" text-anchor="middle" opacity="0.6">1</text>
    <text x="0" y="55" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#666666" text-anchor="middle" letter-spacing="1">REGISTER</text>
    <line x1="30" y1="0" x2="95" y2="0" stroke="#2EAD6B" stroke-width="1" opacity="0.25"/>

    <!-- Step 2: World ID -->
    <circle cx="125" cy="0" r="10" fill="#2EAD6B" opacity="0.08"/>
    <circle cx="125" cy="0" r="30" fill="none" stroke="#2EAD6B" stroke-width="1" opacity="0.4"/>
    <text x="125" y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#2EAD6B" text-anchor="middle">2</text>
    <text x="125" y="55" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#2EAD6B" text-anchor="middle" letter-spacing="1" opacity="0.7">WORLD ID</text>
    <line x1="155" y1="0" x2="220" y2="0" stroke="#375BD2" stroke-width="1" opacity="0.25"/>

    <!-- Step 3: KYC -->
    <circle cx="250" cy="0" r="10" fill="#375BD2" opacity="0.08"/>
    <circle cx="250" cy="0" r="30" fill="none" stroke="#375BD2" stroke-width="1" opacity="0.4"/>
    <text x="250" y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#375BD2" text-anchor="middle">3</text>
    <text x="250" y="55" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#375BD2" text-anchor="middle" letter-spacing="1" opacity="0.7">STRIPE KYC</text>
    <line x1="280" y1="0" x2="345" y2="0" stroke="#FF9F1C" stroke-width="1" opacity="0.25"/>

    <!-- Step 4: Credit -->
    <circle cx="375" cy="0" r="10" fill="#FF9F1C" opacity="0.08"/>
    <circle cx="375" cy="0" r="30" fill="none" stroke="#FF9F1C" stroke-width="1" opacity="0.4"/>
    <text x="375" y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#FF9F1C" text-anchor="middle">4</text>
    <text x="375" y="55" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#FF9F1C" text-anchor="middle" letter-spacing="1" opacity="0.7">PLAID + TEE</text>
    <line x1="405" y1="0" x2="470" y2="0" stroke="#375BD2" stroke-width="1" opacity="0.25"/>

    <!-- Step 5: Access -->
    <circle cx="500" cy="0" r="10" fill="#375BD2" opacity="0.1"/>
    <circle cx="500" cy="0" r="30" fill="none" stroke="#375BD2" stroke-width="1.5" opacity="0.5"/>
    <text x="500" y="6" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#EEEEEE" text-anchor="middle">GO</text>
    <text x="500" y="55" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#375BD2" text-anchor="middle" letter-spacing="1" opacity="0.7">ACCESS</text>
  </g>

  <!-- Tier labels -->
  <text x="705" y="142" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#2EAD6B" text-anchor="middle" letter-spacing="1" opacity="0.3">TIER 2</text>
  <text x="830" y="142" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#375BD2" text-anchor="middle" letter-spacing="1" opacity="0.3">TIER 3</text>
  <text x="955" y="142" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#FF9F1C" text-anchor="middle" letter-spacing="1" opacity="0.3">TIER 4</text>

  <!-- Fades -->
  <rect width="1200" height="400" fill="url(#fadeL)"/>
  <rect width="1200" height="400" fill="url(#fadeR)"/>
  <rect width="1200" height="400" fill="url(#fadeT)"/>
  <rect width="1200" height="400" fill="url(#fadeB)"/>

  <!-- Logo -->
  <rect x="80" y="132" width="7" height="40" rx="1.5" fill="#EEEEEE" opacity="0.3"/>
  <rect x="93" y="132" width="7" height="40" rx="1.5" fill="#EEEEEE" opacity="0.6"/>
  <rect x="106" y="132" width="7" height="40" rx="1.5" fill="#EEEEEE" opacity="0.9"/>
  <text x="126" y="165" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="3" fill="#EEEEEE">WHITEWALL</text>
  <text x="82" y="210" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#EEEEEE" opacity="0.45">The wall that lets you through</text>
  <text x="82" y="250" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#666666">Demo app for the Whitewall OS verification flow</text>
</svg>
